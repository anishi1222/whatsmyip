name: Trigger auto deployment for whatsmyip

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/whatsmyip-AutoDeployTrigger-55cf9744-ab04-4408-b19b-01e941d89c36.yml'

  # Allow mannually trigger 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to container registry
        uses: docker/login-action@v1
        with:
          registry: docker.io
          username: ${{ secrets.WHATSMYIP_REGISTRY_USERNAME }}
          password: ${{ secrets.WHATSMYIP_REGISTRY_PASSWORD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: anishi/whatsmyip:${{ github.sha }}
          file: ./Dockerfile
          context: ./


  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.WHATSMYIP_AZURE_CREDENTIALS }}


      - name: Deploy to containerapp
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            az containerapp registry set -n whatsmyip -g aca1 --server docker.io --username  ${{ secrets.WHATSMYIP_REGISTRY_USERNAME }} --password ${{ secrets.WHATSMYIP_REGISTRY_PASSWORD }}
            az containerapp update -n whatsmyip -g aca1 --image anishi/whatsmyip:${{ github.sha }}
